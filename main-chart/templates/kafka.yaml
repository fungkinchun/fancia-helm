apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: {{ $.Values.projectName }}-{{ $.Values.environment }}-dual-role
  namespace: {{ $.Values.projectName }}-{{ $.Values.environment }}
  labels:
    strimzi.io/cluster: {{ $.Values.projectName }}-{{ $.Values.environment }}-kafka
spec:
  template:
    pod:
      nodeSelector:
        eks.amazonaws.com/compute-type: auto
  replicas: 1
  roles:
    - controller
    - broker
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 1Gi
        class: gp3
        kraftMetadata: shared
---

apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: {{ $.Values.projectName }}-{{ $.Values.environment }}-kafka
  namespace: {{ $.Values.projectName }}-{{ $.Values.environment }}
  annotations:
    strimzi.io/node-pools: enabled
spec:
  kafka:
    version: 4.2.0
    metadataVersion: 4.2-IV1
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
      - name: external
        port: 9094
        type: loadbalancer
        tls: true
        configuration:
          loadbalancer:
            class: eks.amazonaws.com/nlb          
            useServiceDnsDomain: true
          bootstrap:
            annotations:
              service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
              service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
              service.beta.kubernetes.io/aws-load-balancer-healthcheck-protocol: TCP
              service.beta.kubernetes.io/aws-load-balancer-healthcheck-port: "9094"
              external-dns.alpha.kubernetes.io/hostname: bootstrap.{{ $.Values.domainName }}.
              external-dns.alpha.kubernetes.io/ttl: "60"
            host: bootstrap.{{ $.Values.domainName }}
          brokers:
          - broker: 0
            annotations:
              service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
              service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
              external-dns.alpha.kubernetes.io/hostname: broker-0.{{ $.Values.domainName }}.
              external-dns.alpha.kubernetes.io/ttl: "60"
            host: broker-0.{{ $.Values.domainName }}
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
  entityOperator:
    topicOperator: {}
    userOperator: {}
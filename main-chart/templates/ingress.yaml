apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $.Values.projectName }}-ingress
  namespace: {{ $.Values.projectName }}-{{ $.Values.environment }}
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/tags: Environment={{ $.Values.environment }},Project={{ $.Values.projectName }}
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: {{ $.Values.acmCertificateArn }}
spec:
  ingressClassName: alb
  tls:
  - hosts:
    - {{ $.Values.domainName }}
    secretName: {{ $.Values.environment }}-{{ $.Values.projectName }}-tls
  rules:
  - host: {{ $.Values.domainName }}
    http:
      paths:
      {{- range $.Values.repositories }}
      - path: /{{ .name }}
        pathType: Prefix
        backend:
          service:
            name: {{ .name }}
            port:
              number: {{ .port | default 8080 }}
      {{- end }}
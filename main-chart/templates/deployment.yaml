{{- range $.Values.repositories  }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    env: {{ $.Values.environment }}
    app.kubernetes.io/name: {{ .name }}
    app.kubernetes.io/instance: {{ $.Release.Namespace }}
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .name }}
      app.kubernetes.io/instance: {{ $.Release.Namespace }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .name }}
        app.kubernetes.io/instance: {{ $.Release.Namespace }}

    spec:
      serviceAccountName: {{$.Values.projectName}}-sa
      containers:
      - name: {{ .name }}
        image: {{$.Values.awsAccountId}}.dkr.ecr.{{$.Values.awsRegion}}.amazonaws.com/{{$.Values.projectName}}-backend-{{ .name }}:{{ .imageVersion }}
        ports:
        - containerPort: {{ .port }}
        envFrom:
        - secretRef:
            name: {{ .name }}-database
        - secretRef:
            name: s3 
        - secretRef:
            name: smtp
        env:
          - name: SERVER_PORT
            value: "{{ .port }}"
          - name: AWS_RDS_SECRET_NAME
            value: {{ .databaseSecretName }}
          - name: ENV
            value: {{ $.Values.environment }}
          - name: PROJECT_NAME
            value: {{ $.Values.projectName }}
          - name: REPO_NAME
            value: {{ .name }}
          - name: DATABASE_URL
            value: jdbc-secretsmanager:postgresql://{{ .databaseName }}-rds.{{$.Values.domainName}}:5432/{{$.Values.projectName}}
          - name: DOMAIN_NAME
            value: {{ $.Values.domainName }}
          - name: SPRING_PROFILES_ACTIVE
            value: {{ $.Values.environment }}
        readinessProbe:
          httpGet:
            path: /{{ .name }}/actuator/health/readiness
            port: {{ .port }}
          initialDelaySeconds: 120
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5

        livenessProbe:
          httpGet:
            path: /{{ .name }}/actuator/health/liveness
            port: {{ .port }}
          initialDelaySeconds: 120
          periodSeconds: 20
          
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 1000m
            memory: 1.5Gi
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .name }}-hpa
  namespace: {{ $.Release.Namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .name }}
  {{- if eq $.Values.environment "prod" }}
  minReplicas: 1
  maxReplicas: 2
  {{- else }}
  minReplicas: 0
  maxReplicas: 1
  {{- end }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 75
{{- end }}
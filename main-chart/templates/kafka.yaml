apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: {{ $.Values.projectName }}-dual-role
  namespace: {{ $.Values.projectName }}-{{ $.Values.environment }}
  labels:
    strimzi.io/cluster: {{ $.Values.projectName }}-kafka
spec:
  replicas: 3
  roles:
    - controller
    - broker
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 1Gi
        kraftMetadata: shared
---

apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: {{ $.Values.projectName }}-kafka
  namespace: {{ $.Values.projectName }}-{{ $.Values.environment }}
spec:
  kafka:
    version: 4.2.0
    metadataVersion: 4.2-IV1      
    replicas: 3
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
      - name: external
        port: 9094
        type: loadbalancer
        tls: true
        configuration:
          loadbalancer:
            class: aws          
            useServiceDnsDomain: true
    config:
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
      auto.create.topics.enable: false
    storage:
      type: persistent-claim
      size: 1Gi 
      class: gp3
      deleteClaim: false
  entityOperator:
    topicOperator: {}
    userOperator: {}
  cruiseControl: {}
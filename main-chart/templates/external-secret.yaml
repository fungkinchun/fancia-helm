{{- range $secret := $.Values.secrets }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $secret.name }}
  namespace: {{ $secret.namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets
    kind: SecretStore
  target:
    name: {{ $secret.name }}
    creationPolicy: Owner
  dataFrom:
  - extract:
      key: {{ $secret.secretName }}
{{- end }}